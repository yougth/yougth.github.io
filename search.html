---
layout: default
title: SEARCH
---
<div class="page-content-wrap" style="min-height:60vh">
  <h2>Search</h2>
  <input type="text" id="search-input" placeholder="输入关键字搜索..." style="width:100%;padding:12px 18px;font-size:16px;border-radius:6px;border:1px solid rgba(0,0,0,0.1);outline:none;background:transparent;font-family:-apple-system,BlinkMacSystemFont,sans-serif;transition:border-color .3s;margin-bottom:20px;color:#1c1917">
  <ul id="results-container" style="list-style:none;padding:0"></ul>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/simple-jekyll-search/1.9.2/simple-jekyll-search.min.js"></script>
<script>
  var si = document.getElementById('search-input');
  si.addEventListener('focus', function(){ si.style.borderColor='#a52a2a' });
  si.addEventListener('blur', function(){ si.style.borderColor='rgba(0,0,0,0.1)' });

  SimpleJekyllSearch({
    searchInput: si,
    resultsContainer: document.getElementById('results-container'),
    json: '/search.json',
    searchResultTemplate: '<li style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.06)"><a href="{url}" style="font-size:18px;color:#1c1917;font-weight:600;text-decoration:none;border-bottom:none">{title}</a><br><small style="color:#a8a29e">{date}</small></li>',
    noResultsText: '<li style="color:#a8a29e;text-align:center;margin-top:40px">没有找到相关内容</li>'
  });
</script>
